<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Kids Smart Player</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    <div id="app">
        <!-- ================= MÀN HÌNH CHỜ (SPLASH SCREEN) ================= -->
        <div id="start-screen" class="fullscreen-view splash-screen">
            <img src="logo.png" alt="Logo" class="splash-logo">
            <h1 class="splash-title">Kids Video Player</h1>
            <button id="btn-start" class="btn-primary" tabindex="1">Bắt đầu xem</button>
        </div>

        <!-- ================= GIAO DIỆN XEM (TV / PC) ================= -->
        <div id="tv-view" class="hidden fullscreen-view">
            <!-- Nút bí mật cho Admin (Click 5 lần) -->
            <img src="logo.png" id="secret-admin-logo" alt="Admin" title="Click 5 lần để quản trị">
            
            <div class="video-section">
                <div id="ytplayer"></div>
                <div id="click-blocker"></div> <!-- Chặn click Iframe -->
                
                <!-- Lớp phủ khi hết giờ (Screen Time) -->
                <div id="timeout-overlay" class="hidden fullscreen-view splash-screen" style="z-index: 100;">
                    <h1 style="color: #ff4757; font-size: 3rem;">Đã hết giờ xem! ⏰</h1>
                    <p>Bé hãy nghỉ ngơi và quay lại sau nhé.</p>
                </div>
            </div>

            <!-- Khu vực Danh sách & Tìm kiếm cho bé -->
            <div class="kids-playlist-section">
                <input type="text" id="kids-search" class="kids-input" placeholder="🔍 Bé muốn xem gì nào?..." tabindex="2">
                <div id="kids-playlist-container" class="kids-grid">
                    <!-- Thumbnail video sinh tự động -->
                </div>
            </div>
        </div>

        <!-- ================= GIAO DIỆN ADMIN & REMOTE (MOBILE) ================= -->
        <div id="remote-view" class="hidden fullscreen-view admin-panel">
            <div class="admin-header">
                <img src="logo.png" alt="Logo" class="admin-logo">
                <h2>Quản trị & Điều khiển</h2>
            </div>

            <!-- Tabs: Remote / Quản lý Video / Cài đặt -->
            <div class="admin-tabs">
                <button class="tab-btn active" data-tab="tab-remote">📱 Remote</button>
                <button class="tab-btn" data-tab="tab-videos">📺 Video</button>
                <button class="tab-btn" data-tab="tab-settings">⚙️ Cài đặt</button>
            </div>

            <div class="tab-content active" id="tab-remote">
                <div class="remote-box">
                    <input type="text" id="remote-target-id" class="yt-input" placeholder="Nhập Mã TV...">
                    <button id="btn-connect-tv" class="btn-primary" style="margin-top: 10px; width: 100%;">Kết nối TV</button>
                    <p id="remote-status" class="status-text"></p>
                </div>
                
                <div id="remote-controls" class="hidden">
                    <h3 style="color: #2ed573; text-align: center; margin-bottom: 20px;">Đã kết nối TV</h3>
                    <div class="remote-grid">
                        <button id="rem-prev" class="btn-icon large-icon">⏮</button>
                        <button id="rem-play" class="btn-icon large-icon" style="background: #ff4757;">⏯</button>
                        <button id="rem-next" class="btn-icon large-icon">⏭</button>
                    </div>
                </div>
            </div>

            <div class="tab-content" id="tab-videos">
                <div class="add-video-box">
                    <input type="text" id="new-vid-id" class="yt-input" placeholder="ID Video YouTube (VD: XqZsoesa55w)">
                    <input type="text" id="new-vid-title" class="yt-input" placeholder="Tên video hiển thị cho bé">
                    <input type="text" id="new-vid-thumb" class="yt-input" placeholder="Link ảnh thu nhỏ (Không bắt buộc)">
                    <button id="btn-add-video" class="btn-primary" style="margin-top: 10px; width: 100%;">➕ Thêm vào Whitelist</button>
                </div>
                <ul id="admin-playlist" class="admin-list"></ul>
            </div>

            <div class="tab-content" id="tab-settings">
                <div class="settings-box">
                    <h3>Giới hạn thời gian (Screen Time)</h3>
                    <div style="display: flex; gap: 10px; margin-top: 10px;">
                        <input type="number" id="timer-input" class="yt-input" placeholder="Số phút (VD: 30)">
                        <button id="btn-set-timer" class="btn-primary">Bắt đầu</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- ================= MODAL NHẬP PIN & INFO TV ================= -->
        <div id="pin-modal" class="modal hidden">
            <div class="yt-panel">
                <h2 style="margin-bottom: 15px;">Xác thực Quản trị</h2>
                <input type="password" id="pin-input" class="yt-input" tabindex="10" inputmode="numeric" placeholder="****">
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button id="btn-submit-pin" class="btn-primary" style="flex: 1;" tabindex="11">Vào</button>
                    <button id="btn-cancel-pin" class="btn-secondary" style="flex: 1;" tabindex="12">Hủy</button>
                </div>
            </div>
        </div>

        <!-- Modal hiển thị mã TV (Chỉ mở khi nhập đúng PIN trên TV) -->
        <div id="tv-info-modal" class="modal hidden">
            <div class="yt-panel" style="text-align: center;">
                <h2>Thông tin TV</h2>
                <p style="margin: 20px 0; color: #aaa;">Mã kết nối Điều khiển từ xa:</p>
                <h1 id="display-tv-id" style="color: #ff4757; letter-spacing: 2px; font-size: 2.5rem;">----</h1>
                <button id="btn-close-tv-info" class="btn-primary" style="margin-top: 20px; width: 100%;">Đóng</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
