<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Kids Smart Player</title>
    <link rel="stylesheet" href="style.css">
    <!-- Firebase App & Realtime Database -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>
    <div id="app">
        <!-- MÀN HÌNH CHỜ -->
        <div id="start-screen" class="fullscreen-view splash-screen">
            <img src="logo.png" alt="Logo" class="splash-logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1384/1384060.png'">
            <h1 class="splash-title">Kids Video Player</h1>
            <div style="display: flex; gap: 20px; flex-direction: column; align-items: center;">
                <button id="btn-mode-tv" class="btn-primary" style="width: 250px;">📺 Bé xem TV</button>
                <button id="btn-mode-admin" class="btn-secondary" style="width: 250px;">⚙️ Ba Mẹ quản lý</button>
            </div>
        </div>

        <!-- GIAO DIỆN XEM (TV / PC) -->
        <div id="tv-view" class="hidden fullscreen-view">
            <div class="video-section">
                <!-- Loading Spinner -->
                <div id="loading-spinner" class="hidden loader"></div>
                
                <div id="ytplayer"></div>
                <div id="click-blocker"></div> 
                
                <div class="yt-custom-controls">
                    <div class="progress-container" id="tv-progress-container">
                        <div class="progress-bar" id="tv-progress-bar"></div>
                    </div>
                    <div class="controls-row">
                        <div class="controls-left">
                            <span class="time-display" id="tv-time-display">0:00 / 0:00</span>
                        </div>
                        <div class="controls-right">
                            <span style="color:#aaa; font-size:0.9rem;">Mã TV: <b style="color:#fff;">1111</b></span>
                            <button id="btn-custom-fullscreen" class="icon-btn" title="Toàn màn hình">🔲</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="kids-playlist-section">
                <input type="text" id="kids-search" class="kids-input" placeholder="🔍 Tìm video trong danh sách...">
                <div id="kids-playlist-container" class="kids-grid"></div>
            </div>
        </div>

        <!-- GIAO DIỆN ADMIN (MOBILE) -->
        <div id="remote-view" class="hidden fullscreen-view admin-panel">
            <div class="admin-header">
                <h2>📱 Bảng Quản Trị</h2>
                <button class="btn-secondary" onclick="location.reload()" style="padding: 5px 15px;">Thoát</button>
            </div>

            <div class="admin-tabs">
                <button class="tab-btn active" data-tab="tab-remote">📱 Remote</button>
                <button class="tab-btn" data-tab="tab-search">🔍 Tìm YouTube</button>
                <button class="tab-btn" data-tab="tab-videos">📺 Whitelist</button>
            </div>

            <!-- Tab Remote -->
            <div class="tab-content active" id="tab-remote">
                <div class="remote-box">
                    <input type="text" id="remote-target-id" class="yt-input" value="1111" placeholder="Mã TV">
                    <button id="btn-connect-tv" class="btn-primary" style="margin-top: 10px; width: 100%;">Kết nối TV</button>
                    <p id="remote-status" class="status-text"></p>
                </div>

                <div id="remote-controls" class="hidden" style="margin-top: 20px;">
                    <div class="now-playing-box">
                        <p style="color:#aaa; font-size: 0.9rem;">Đang phát trên TV:</p>
                        <h3 id="rem-now-playing" style="color:var(--focus-ring); margin: 5px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">---</h3>
                        <div class="progress-container" style="height: 4px; pointer-events: none; margin-bottom: 10px;">
                            <div class="progress-bar" id="rem-progress-bar" style="background:var(--focus-ring)"></div>
                        </div>
                    </div>

                    <div class="remote-grid">
                        <button id="rem-prev" class="btn-icon large-icon">⏮</button>
                        <button id="rem-play" class="btn-icon large-icon" style="background: #ff0000;">⏯</button>
                        <button id="rem-next" class="btn-icon large-icon">⏭</button>
                    </div>

                    <div class="volume-box">
                        <span style="font-size:1.5rem;">🔉</span>
                        <input type="range" id="rem-volume" min="0" max="100" value="100" style="flex:1;">
                        <span style="font-size:1.5rem;">🔊</span>
                    </div>
                </div>
            </div>

            <!-- Tab Search API -->
            <div class="tab-content" id="tab-search">
                <div class="settings-box">
                    <input type="password" id="yt-api-key" class="yt-input" placeholder="Nhập YouTube API Key (AIzaSy...)">
                    <div style="display: flex; gap: 10px; margin-top: 15px;">
                        <input type="text" id="live-search-input" class="yt-input" placeholder="Tìm video...">
                        <button id="btn-live-search" class="btn-primary">Tìm</button>
                    </div>
                </div>
                <div id="live-search-results" class="admin-list" style="margin-top: 20px;"></div>
            </div>

            <!-- Tab Whitelist -->
            <div class="tab-content" id="tab-videos">
                <ul id="admin-playlist" class="admin-list"></ul>
            </div>
        </div>

        <!-- MODAL NHẬP PIN -->
        <div id="pin-modal" class="modal hidden">
            <div class="yt-panel" style="text-align: center;">
                <h2 style="margin-bottom: 15px;">Xác thực Ba Mẹ</h2>
                <input type="password" id="pin-input" class="yt-input" inputmode="numeric" placeholder="PIN: 8989">
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button id="btn-submit-pin" class="btn-primary" style="flex: 1;">Vào</button>
                    <button id="btn-cancel-pin" class="btn-secondary" style="flex: 1;">Hủy</button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
