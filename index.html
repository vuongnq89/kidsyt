<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Kids Smart Player</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    <div id="app">
        <!-- ================= MÀN HÌNH CHỜ (CHỌN CHẾ ĐỘ RÕ RÀNG) ================= -->
        <div id="start-screen" class="fullscreen-view splash-screen">
            <img src="logo.png" alt="Logo" class="splash-logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1384/1384060.png'">
            <h1 class="splash-title">Kids Video Player</h1>
            <div style="display: flex; gap: 20px; flex-direction: column; align-items: center;">
                <button id="btn-mode-tv" class="btn-primary" tabindex="1" style="width: 250px;">📺 Bé xem TV</button>
                <button id="btn-mode-admin" class="btn-secondary" tabindex="2" style="width: 250px; font-size: 1rem;">⚙️ Ba Mẹ quản lý (Remote)</button>
            </div>
        </div>

        <!-- ================= GIAO DIỆN XEM (TV / PC) ================= -->
        <div id="tv-view" class="hidden fullscreen-view">
            <div class="video-section">
                <div id="ytplayer"></div>
                <div id="click-blocker"></div> <!-- Chặn click Iframe -->
                
                <div id="timeout-overlay" class="hidden fullscreen-view splash-screen" style="z-index: 100;">
                    <h1 style="color: #ff4757; font-size: 3rem;">Đã hết giờ xem! ⏰</h1>
                    <p>Bé hãy nghỉ ngơi và quay lại sau nhé.</p>
                </div>
            </div>

            <!-- Khu vực Tìm kiếm (Chỉ lọc trong Whitelist) -->
            <div class="kids-playlist-section">
                <input type="text" id="kids-search" class="kids-input" placeholder="🔍 Tìm trong danh sách an toàn..." tabindex="2">
                <div id="kids-playlist-container" class="kids-grid">
                    <!-- Thumbnail video sinh tự động -->
                </div>
            </div>
        </div>

        <!-- ================= GIAO DIỆN ADMIN & REMOTE ================= -->
        <div id="remote-view" class="hidden fullscreen-view admin-panel">
            <div class="admin-header">
                <h2>📱 Bảng Quản Trị</h2>
                <button class="btn-secondary" onclick="location.reload()" style="padding: 5px 15px; font-size: 0.9rem;">Thoát</button>
            </div>

            <div class="admin-tabs">
                <button class="tab-btn active" data-tab="tab-remote">📱 Remote</button>
                <button class="tab-btn" data-tab="tab-videos">📺 Video</button>
                <button class="tab-btn" data-tab="tab-settings">⚙️ Hẹn giờ</button>
            </div>

            <!-- Tab Điều khiển -->
            <div class="tab-content active" id="tab-remote">
                <div class="remote-box">
                    <p style="margin-bottom: 10px; color: #aaa;">Mã TV mặc định là 1111</p>
                    <input type="text" id="remote-target-id" class="yt-input" placeholder="Nhập mã TV..." value="1111">
                    <button id="btn-connect-tv" class="btn-primary" style="margin-top: 10px; width: 100%;">Kết nối TV</button>
                    <p id="remote-status" class="status-text"></p>
                </div>
                
                <div id="remote-controls" class="hidden">
                    <h3 style="color: #2ed573; text-align: center; margin-bottom: 20px;">✅ Đã kết nối TV</h3>
                    <div class="remote-grid">
                        <button id="rem-prev" class="btn-icon large-icon">⏮</button>
                        <button id="rem-play" class="btn-icon large-icon" style="background: #ff4757;">⏯</button>
                        <button id="rem-next" class="btn-icon large-icon">⏭</button>
                    </div>
                </div>
            </div>

            <!-- Tab Thêm Video -->
            <div class="tab-content" id="tab-videos">
                <div class="add-video-box">
                    <input type="text" id="new-vid-id" class="yt-input" placeholder="ID Video YouTube (VD: XqZsoesa55w)" style="margin-bottom: 10px;">
                    <input type="text" id="new-vid-title" class="yt-input" placeholder="Tên video hiển thị cho bé">
                    <button id="btn-add-video" class="btn-primary" style="margin-top: 10px; width: 100%;">➕ Thêm vào Whitelist</button>
                </div>
                <ul id="admin-playlist" class="admin-list"></ul>
            </div>

            <!-- Tab Cài đặt -->
            <div class="tab-content" id="tab-settings">
                <div class="settings-box">
                    <h3>Khóa màn hình sau (phút):</h3>
                    <div style="display: flex; gap: 10px; margin-top: 10px;">
                        <input type="number" id="timer-input" class="yt-input" placeholder="VD: 30">
                        <button id="btn-set-timer" class="btn-primary">Gửi lệnh</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- ================= MODAL NHẬP PIN ================= -->
        <div id="pin-modal" class="modal hidden">
            <div class="yt-panel">
                <h2 style="margin-bottom: 15px;">Xác thực Ba Mẹ</h2>
                <p style="color: #aaa; margin-bottom: 15px;">Mật khẩu: 8989</p>
                <input type="password" id="pin-input" class="yt-input" tabindex="10" inputmode="numeric" placeholder="****">
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button id="btn-submit-pin" class="btn-primary" style="flex: 1;" tabindex="11">Vào</button>
                    <button id="btn-cancel-pin" class="btn-secondary" style="flex: 1;" tabindex="12">Hủy</button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
